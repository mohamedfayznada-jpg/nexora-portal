<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA | Secure Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-darker: #080C16;
            --midnight-navy: #0F172A;
            --luxury-gold: #C8A96A;
            --pure-white: #F8FAFC;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--midnight-darker);
            color: var(--pure-white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            border-top: 3px solid var(--luxury-gold);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 10px;
            color: var(--pure-white);
        }

        .svg-icon { width: 35px; height: 35px; }

        .auth-subtitle {
            font-size: 0.75rem;
            color: var(--luxury-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--pure-white);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--luxury-gold);
            background: rgba(0,0,0,0.6);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--luxury-gold);
            color: var(--midnight-darker);
            border: none;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--pure-white);
        }

        .submit-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
        }

        .system-msg {
            margin-top: 20px;
            font-size: 0.8rem;
            min-height: 20px;
            letter-spacing: 1px;
        }

        .error-msg { color: #ef4444; }
        .success-msg { color: var(--approved-green, #10B981); }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: var(--transition);
        }
        
        .back-link:hover { color: var(--luxury-gold); }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-logo">
            <svg class="svg-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="10,20 40,40 40,80 10,80" fill="#FFFFFF" />
                <polygon points="35,45 65,60 65,70 35,55" fill="#FFFFFF" />
                <polygon points="60,50 90,70 90,80 60,60" fill="#FFFFFF" />
                <polygon points="60,20 90,20 90,65 60,45" fill="#C8A96A" />
            </svg>
            NEXOR&Lambda;
        </div>
        <div class="auth-subtitle">Secure Client Portal</div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Identity Key</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Passcode</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">Authenticate</button>
            <div id="systemMessage" class="system-msg"></div>
        </form>

        <a href="index.html" class="back-link">&#8592; Return to Directory</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRul7Lv-zjUjodvqCIguikWDbiBtFnjo",
            authDomain: "nexora-a4dcc.firebaseapp.com",
            projectId: "nexora-a4dcc",
            storageBucket: "nexora-a4dcc.firebasestorage.app",
            messagingSenderId: "284864772598",
            appId: "1:284864772598:web:b1eb60c781a7c829b8afd7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const systemMessage = document.getElementById('systemMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'VERIFYING...';
            systemMessage.className = 'system-msg';
            systemMessage.textContent = '';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                systemMessage.className = 'system-msg success-msg';
                systemMessage.textContent = 'ACCESS GRANTED. REDIRECTING...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.textContent = 'AUTHENTICATE';
                systemMessage.className = 'system-msg error-msg';
                systemMessage.textContent = 'ACCESS DENIED: INVALID CREDENTIALS.';
            }
        });
    </script>
</body>
</html>
