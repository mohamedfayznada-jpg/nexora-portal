<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA | Secure Client Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-navy: #0F172A;
            --luxury-gold: #C8A96A;
            --pure-white: #F8FAFC;
            --card-bg: rgba(30, 41, 59, 0.7);
            --approved-green: #10B981;
            --revision-red: #EF4444;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--midnight-navy);
            color: var(--pure-white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* الهوية البصرية المطابقة للـ PDF */
        .portal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 50px; background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(200, 169, 106, 0.3);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-identity {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.8rem; font-weight: 700; letter-spacing: 8px; color: var(--pure-white);
        }

        .brand-identity img { height: 35px; width: auto; }

        .user-controls { display: flex; align-items: center; gap: 20px; }
        .client-email { font-size: 0.85rem; color: var(--luxury-gold); letter-spacing: 1px; }

        .logout-btn {
            background: transparent; color: var(--pure-white);
            border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px;
            font-family: inherit; font-size: 0.8rem; letter-spacing: 2px;
            cursor: pointer; transition: var(--transition); text-transform: uppercase;
        }
        .logout-btn:hover { border-color: var(--luxury-gold); color: var(--luxury-gold); }

        .dashboard-main { padding: 50px; flex-grow: 1; max-width: 1400px; margin: 0 auto; width: 100%; }
        .section-title { font-size: 2rem; font-weight: 300; margin-bottom: 5px; }
        .section-title span { font-weight: 700; color: var(--luxury-gold); }
        .section-desc { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-bottom: 40px; letter-spacing: 1px; }

        .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .asset-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; display: flex; flex-direction: column; transition: var(--transition);
            position: relative;
        }
        .asset-card:hover { border-color: var(--luxury-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        /* شريط الحالة الهندسي */
        .status-banner {
            position: absolute; top: 15px; right: 15px; padding: 5px 12px;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.2);
            z-index: 10; backdrop-filter: blur(5px);
        }
        .status-approved { border-color: var(--approved-green); color: var(--approved-green); }
        .status-revision { border-color: var(--revision-red); color: var(--revision-red); }

        .media-viewport { width: 100%; height: 260px; background: #000; position: relative; }
        .media-viewport img, .media-viewport iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        .asset-footer { padding: 20px; background: rgba(0,0,0,0.4); }
        .asset-name { font-size: 1rem; margin-bottom: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn {
            padding: 10px; font-family: inherit; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; cursor: pointer; transition: var(--transition); border: 1px solid transparent;
        }
        .btn-approve { background: rgba(16, 185, 129, 0.1); color: var(--approved-green); border-color: rgba(16, 185, 129, 0.3); }
        .btn-approve:hover { background: var(--approved-green); color: var(--midnight-navy); }
        
        .btn-revise { background: rgba(239, 68, 68, 0.1); color: var(--revision-red); border-color: rgba(239, 68, 68, 0.3); }
        .btn-revise:hover { background: var(--revision-red); color: var(--pure-white); }
        
        .btn-full { grid-column: span 2; background: var(--luxury-gold); color: var(--midnight-navy); margin-top: 10px; }
        .btn-full:hover { background: var(--pure-white); }

        .system-loader { text-align: center; padding: 100px; color: var(--luxury-gold); letter-spacing: 4px; font-size: 1.2rem; }
        
        /* تذييل المهندس */
        .footer-credit { text-align: center; padding: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.2); letter-spacing: 3px; }
    </style>
</head>
<body>

    <header class="portal-header">
        <div class="brand-identity">
            <img src="./Assets/n-mark.png" alt="NEXORA">
            NEXOR&Lambda;
        </div>
        <div class="user-controls">
            <span class="client-email" id="userEmail">AUTHENTICATING...</span>
            <button class="logout-btn" id="logoutBtn">SIGN OUT</button>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="section-title">Project <span>Deliverables</span></div>
        <div class="section-desc">ENGINEERING PREMIUM BRAND COMMUNICATION</div>
        
        <div id="loader" class="system-loader">SYNCING SECURE CLOUD...</div>
        <div class="assets-grid" id="assetsGrid"></div>
    </main>

    <footer class="footer-credit">SYSTEM ARCHITECTURE BY مُحَمَّد فايز</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgRul7Lv-zjUjodvqCIguikWDbiBtFnjo",
            authDomain: "nexora-a4dcc.firebaseapp.com",
            projectId: "nexora-a4dcc",
            storageBucket: "nexora-a4dcc.firebasestorage.app",
            messagingSenderId: "284864772598",
            appId: "1:284864772598:web:b1eb60c781a7c829b8afd7"
        };
        const GOOGLE_API_KEY = "AIzaSyBpowVCa3Rdy239fHLnim0YRU2Dp8RqY7g";
        const clientMatrix = {
            "client@nexora.com": "1YHzVEzbTpBjaONRd10I5-6Rtmv70MIbY",
            "amer@nexora.com": "1YHzVEzbTpBjaONRd10I5-6Rtmv70MIbY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserEmail = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email.toLowerCase();
                document.getElementById('userEmail').textContent = currentUserEmail.toUpperCase();
                initializeDashboard(currentUserEmail);
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        });

        async function initializeDashboard(email) {
            const folderId = clientMatrix[email];
            const loader = document.getElementById('loader');
            if (!folderId) {
                loader.textContent = "NO SECURE FOLDER ASSIGNED."; return;
            }

            const queryParam = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${queryParam}&fields=files(id,name,mimeType,thumbnailLink)&key=${GOOGLE_API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const assets = data.files.filter(f => f.mimeType.includes('image') || f.mimeType.includes('video'));
                loader.style.display = 'none';
                renderAssets(assets);
            } catch (error) {
                loader.textContent = "SYSTEM ERROR.";
            }
        }

        async function renderAssets(files) {
            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = '';

            for (const file of files) {
                const isVideo = file.mimeType.includes('video');
                let highResImage = file.thumbnailLink ? file.thumbnailLink.replace(/=s\d+/, '=s1000') : '';
                const previewUrl = isVideo ? `https://drive.google.com/file/d/${file.id}/preview` : highResImage;
                const cleanName = file.name.split('.').slice(0, -1).join('.') || file.name;

                // جلب الحالة من قاعدة البيانات
                const statusDoc = await getDoc(doc(db, "asset_status", file.id));
                const statusData = statusDoc.exists() ? statusDoc.data().status : 'PENDING';
                
                let statusHtml = '';
                if(statusData === 'APPROVED') statusHtml = `<div class="status-banner status-approved">APPROVED</div>`;
                if(statusData === 'REVISION') statusHtml = `<div class="status-banner status-revision">REVISION REQUESTED</div>`;

                const mediaMarkup = isVideo 
                    ? `<iframe src="${previewUrl}" loading="lazy"></iframe>`
                    : `<img src="${previewUrl}" loading="lazy" alt="${cleanName}">`;

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.id = `card-${file.id}`;
                card.innerHTML = `
                    ${statusHtml}
                    <div class="media-viewport">${mediaMarkup}</div>
                    <div class="asset-footer">
                        <div class="asset-name">${cleanName}</div>
                        <div class="action-grid">
                            <button class="btn btn-approve" onclick="updateStatus('${file.id}', 'APPROVED')">APPROVE</button>
                            <button class="btn btn-revise" onclick="updateStatus('${file.id}', 'REVISION')">REVISE</button>
                            <button class="btn btn-full" onclick="alert('Feedback system running in console.')">VIEW / ADD FEEDBACK</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        window.updateStatus = async function(fileId, newStatus) {
            try {
                await setDoc(doc(db, "asset_status", fileId), {
                    status: newStatus,
                    updatedBy: currentUserEmail,
                    timestamp: new Date()
                });
                // إعادة تحميل الصفحة لتطبيق التغييرات البصرية
                window.location.reload();
            } catch (error) {
                alert("Authorization Error: Cannot update status.");
            }
        }
    </script>
</body>
</html>
